<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>项目导航 - Kidwords</title>
  <link rel="stylesheet" href="./assets/css/style.css">
</head>
<body>
  <main class="container">
    <h1>项目导航</h1>
    <p class="lead">快速查看和跳转到常用仓库示例</p>

    <div class="controls">
      <input id="search" type="search" placeholder="搜索仓库 name / description (回车清空)" aria-label="搜索仓库">
      <select id="sort">
        <option value="pushed">按最近推送 (默认)</option>
        <option value="stars">按星标</option>
        <option value="name">按名称</option>
      </select>
      <select id="perPage">
        <option value="6">每页 6</option>
        <option value="12" selected>每页 12</option>
        <option value="24">每页 24</option>
      </select>
      <button id="refresh" class="btn">刷新</button>
    </div>

    <div class="controls" style="margin-top:8px;">
      <label for="proxyMode" style="color:var(--muted);margin-right:8px">数据源</label>
      <select id="proxyMode">
        <option value="auto">自动（优先使用 navigator/data/repos.json）</option>
        <option value="worker">Cloudflare Worker</option>
        <option value="custom">自定义代理 URL</option>
        <option value="api">直接调 GitHub API</option>
      </select>
      <input id="proxyUrl" type="url" placeholder="自定义代理 URL（例如：https://worker.example.com/）" style="flex:1;margin-left:8px;padding:8px;border-radius:8px;border:1px solid rgba(255,255,255,0.04);background:transparent;color:var(--muted)" />
      <button id="saveProxy" class="btn" style="margin-left:8px">保存</button>
    </div>

    <section id="repos">
      <!-- Repo cards inserted by JS -->
    </section>

    <nav id="pager" class="pager" aria-label="分页控件"></nav>

    <footer>
      <p>静态导航示例 · 部署于 GitHub Pages</p>
    </footer>
  </main>
  <script src="./assets/js/app.js"></script>
</body>
</html>
